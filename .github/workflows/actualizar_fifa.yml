name: Actualizar Datos FIFA

on:
  schedule:
    # Se ejecuta cada 15 minutos de forma automática
    - cron: '*/15 * * * *'
  workflow_dispatch: # Te permite activar la actualización manualmente desde GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Descargar JSON de la FIFA
      run: |
        curl -s "https://play.fifa.com/json/fantasy/rounds.json" -o datos-fifa.json

    - name: Guardar cambios y subirlos a GitHub
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add datos-fifa.json
        # Solo hace commit si el archivo realmente cambió para evitar bucles innecesarios
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Resultados actualizados automáticamente" && git push)